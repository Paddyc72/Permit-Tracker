*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a}
.hdr{background:#1a1a1a;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:16px;font-weight:600}
.hdr .cnt{font-size:13px;color:#aaa}
.tb{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 14px;display:flex;gap:8px;overflow-x:auto}
.tb button{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap}
.tb button.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zt{background:#fff;border-bottom:1px solid #e8e8e8;display:flex;overflow-x:auto}
.zt div{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;color:#888;border-bottom:2px solid transparent}
.zt div.on{color:#1a1a1a;border-bottom-color:#1a1a1a}
.zn{display:inline-block;background:#f0f0f0;color:#666;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px}
.zt div.on .zn{background:#1a1a1a;color:#fff}
.cards{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #eee}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.ca{font-size:14px;font-weight:600;line-height:1.3}
.cs{font-size:11px;color:#888;margin-top:1px}
.ob{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.hi{background:#d4edda;color:#155724}
.mi{background:#cce5ff;color:#004085}
.lo{background:#f0f0f0;color:#666}
.cl{font-size:12px;color:#555;margin-bottom:8px}
.cb{display:flex;justify-content:space-between;align-items:center}
.tp{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.td{width:7px;height:7px;border-radius:50%}
.da{font-size:11px;color:#999}
a.sv{display:inline-flex;align-items:center;gap:4px;background:#f7f7f7;border:1px solid #e0e0e0;border-radius:6px;padding:5px 9px;font-size:11px;font-weight:500;color:#444;text-decoration:none}
.empty{padding:40px;text-align:center;color:#aaa;font-size:14px}
</style>
